version: 2
updates:
  # 1. Python Dependencies (FastAPI/Django)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    # This groups all python updates into one single PR
    groups:
      python-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "python"

  # 2. GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions-updates:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "github-actions"

  # 3. Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      docker-updates:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "docker"