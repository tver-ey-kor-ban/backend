services:
  - type: web
    name: garage-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false          # Set this manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render generates a random value automatically
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: ALLOWED_ORIGINS
        value: "*"           # Change to your Flutter app domain in production
      - key: ADMIN_EMAIL
        value: admin@example.com
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false          # Set a strong password in Render dashboard
      - key: ENVIRONMENT
        value: production
      - key: WORKERS
        value: 1
