services:
  db:
    image: postgres:15-alpine
    container_name: garage_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-garage_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - garage_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: garage_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-garage_db}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - garage_network
    volumes:
      - ./uploads:/code/uploads

volumes:
  postgres_data:

networks:
  garage_network:
    driver: bridge
